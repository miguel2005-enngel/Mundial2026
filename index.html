<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="google-site-verification" content="nVeHKCnDlV7KjXDKWDPjInOwfWHeB7beOLVFnPkOzK4" />
    <meta name="description" content="Simulador del Mundial 2026, predice los resultados de la fase de grupos">
    <title>Simulador Mundial 2026</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #2b78e4;
            --success: #27ae60;
            --purple: #8e44ad;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --gold: #f1c40f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1, h2 { text-align: center; color: var(--dark); }
        .grid-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card-grupo {
            background: var(--light);
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
        }
        .card-grupo h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            color: var(--primary);
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        .btn {
            display: block;
            width: 280px;
            margin: 30px auto 0;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-success { background: var(--success); }
        .btn-purple { background: var(--purple); }

        .seccion { display: none; }
        .seccion.activa { display: block; }

        .terceros-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .checkbox-wrapper {
            background: var(--light);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .match-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--light);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            background: white;
            border: 1px solid #ccc;
            min-width: 150px;
        }
        .campeon-box {
            text-align: center;
            background: var(--gold);
            padding: 40px;
            border-radius: 15px;
            border: 5px solid #d4ac0d;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="paso-grupos" class="seccion activa">
        <h1>Simulador Mundial 2026</h1>
        <h2>Fase de Grupos</h2>
        <div class="grid-grupos" id="contenedor-grupos"></div>
        <button class="btn" onclick="procesarFaseGrupos()">Elegir Mejores Terceros &rarr;</button>
    </div>

    <div id="paso-terceros" class="seccion">
        <h1>Mejores Terceros Lugares</h1>
        <h2>Selecciona exactamente 8 equipos</h2>
        <div class="terceros-list" id="contenedor-terceros"></div>
        <button class="btn btn-success" onclick="procesarTerceros()">Generar Ronda de 32 &rarr;</button>
    </div>

    <div id="paso-eliminatorias" class="seccion">
        <h1 id="titulo-fase">Ronda de 32</h1>
        <h2 id="subtitulo-fase">Selecciona al ganador de cada llave</h2>
        <div id="contenedor-llaves"></div>
        <button class="btn btn-purple" id="btn-avanzar" onclick="avanzarRonda()">Siguiente Ronda &rarr;</button>
    </div>

    <div id="paso-final" class="seccion">
        <div class="campeon-box">
            <h1 style="font-size: 40px;">🏆 ¡CAMPEÓN! 🏆</h1>
            <h2 id="nombre-campeon" style="font-size: 60px; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);"></h2>
            <button class="btn" onclick="location.reload()">Reiniciar Simulador</button>
        </div>
    </div>

</div>

<script>
    const gruposData = {
        'A': ['México', 'Sudáfrica', 'Corea del Sur', 'República Checa'],
        'B': ['Canadá', 'Bosnia y Herzegovina', 'Qatar', 'Suiza'],
        'C': ['Brasil', 'Marruecos', 'Haití', 'Escocia'],
        'D': ['Estados Unidos', 'Paraguay', 'Australia', 'Turquía'],
        'E': ['Alemania', 'Curazao', 'Costa de Marfil', 'Ecuador'],
        'F': ['Países Bajos', 'Japón', 'Suecia', 'Túnez'],
        'G': ['Bélgica', 'Egipto', 'Irán', 'Nueva Zelanda'],
        'H': ['España', 'Cabo Verde', 'Arabia Saudita', 'Uruguay'],
        'I': ['Francia', 'Senegal', 'Irak', 'Noruega'],
        'J': ['Argentina', 'Argelia', 'Austria', 'Jordania'],
        'K': ['Portugal', 'RD Congo', 'Uzbekistán', 'Colombia'],
        'L': ['Inglaterra', 'Croacia', 'Ghana', 'Panamá']
    };

    let clasificados = {};

    function inicializarGrupos() {
        const contenedor = document.getElementById('contenedor-grupos');
        let html = '';
        for (const [letra, equipos] of Object.entries(gruposData)) {
            html += `
                <div class="card-grupo">
                    <h3>Grupo ${letra}</h3>
                    <select id="p1-${letra}">${equipos.map((e,i)=>`<option ${i==0?'selected':''}>${e}</option>`).join('')}</select>
                    <select id="p2-${letra}">${equipos.map((e,i)=>`<option ${i==1?'selected':''}>${e}</option>`).join('')}</select>
                    <select id="p3-${letra}">${equipos.map((e,i)=>`<option ${i==2?'selected':''}>${e}</option>`).join('')}</select>
                </div>`;
        }
        contenedor.innerHTML = html;
    }

    function cambiarPaso(actual, siguiente) {
        document.getElementById(actual).classList.remove('activa');
        document.getElementById(siguiente).classList.add('activa');
        window.scrollTo(0,0);
    }

    function procesarFaseGrupos() {
        for (const letra of Object.keys(gruposData)) {
            const p1 = document.getElementById(`p1-${letra}`).value;
            const p2 = document.getElementById(`p2-${letra}`).value;
            const p3 = document.getElementById(`p3-${letra}`).value;
            if (p1 === p2 || p1 === p3 || p2 === p3) return alert("Repetiste equipos en el Grupo " + letra);
            clasificados['1'+letra] = p1;
            clasificados['2'+letra] = p2;
        }
        const contenedor = document.getElementById('contenedor-terceros');
        contenedor.innerHTML = Object.keys(gruposData).map(l => {
            const p3 = document.getElementById(`p3-${l}`).value;
            return `<label class="checkbox-wrapper"><input type="checkbox" name="terceros" value="${p3}"><span>${p3} (${l})</span></label>`;
        }).join('');
        cambiarPaso('paso-grupos', 'paso-terceros');
    }

    function procesarTerceros() {
        const sel = Array.from(document.querySelectorAll('input[name="terceros"]:checked')).map(cb => cb.value);
        if (sel.length !== 8) return alert("Selecciona exactamente 8 terceros");
        
        const llaves = [
            [clasificados['1E'], sel[0]], [clasificados['1I'], sel[1]], [clasificados['2A'], clasificados['2B']], [clasificados['1F'], clasificados['2C']],
            [clasificados['2K'], clasificados['2L']], [clasificados['1H'], clasificados['2J']], [clasificados['1D'], sel[2]], [clasificados['1G'], sel[3]],
            [clasificados['1C'], clasificados['2F']], [clasificados['2E'], clasificados['2I']], [clasificados['1A'], sel[4]], [clasificados['1L'], sel[5]],
            [clasificados['1J'], clasificados['2H']], [clasificados['2D'], clasificados['2G']], [clasificados['1B'], sel[6]], [clasificados['1K'], sel[7]]
        ];
        dibujarRonda("Ronda de 32", llaves);
        cambiarPaso('paso-terceros', 'paso-eliminatorias');
    }

    function dibujarRonda(titulo, parejas) {
        document.getElementById('titulo-fase').innerText = titulo;
        const contenedor = document.getElementById('contenedor-llaves');
        contenedor.innerHTML = parejas.map((p, i) => `
            <div class="match-row">
                <label class="radio-label"><input type="radio" name="m${i}" value="${p[0]}" checked> ${p[0]}</label>
                <b>vs</b>
                <label class="radio-label"><input type="radio" name="m${i}" value="${p[1]}"> ${p[1]}</label>
            </div>`).join('');
    }

    function avanzarRonda() {
        const ganadores = Array.from(document.querySelectorAll('.match-row')).map((_, i) => 
            document.querySelector(`input[name="m${i}"]:checked`).value
        );

        if (ganadores.length === 16) {
            dibujarRonda("Octavos de Final", agrupar(ganadores));
        } else if (ganadores.length === 8) {
            dibujarRonda("Cuartos de Final", agrupar(ganadores));
        } else if (ganadores.length === 4) {
            dibujarRonda("Semifinales", agrupar(ganadores));
        } else if (ganadores.length === 2) {
            dibujarRonda("¡GRAN FINAL!", [[ganadores[0], ganadores[1]]]);
            document.getElementById('btn-avanzar').innerText = "🏆 Coronar Campeón";
        } else {
            document.getElementById('nombre-campeon').innerText = ganadores[0];
            cambiarPaso('paso-eliminatorias', 'paso-final');
        }
    }

    function agrupar(lista) {
        let res = [];
        for (let i = 0; i < lista.length; i += 2) res.push([lista[i], lista[i+1]]);
        return res;
    }

    window.onload = inicializarGrupos;
</script>
</body>
</html>
