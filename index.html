
<!DOCTYPE html>
<html lang="es">
<head>
<meta name="google-site-verification" content="nVeHKCnDlV7KjXDKWDPjInOwfWHeB7beOLVFnPkOzK4" />
<meta name="description" content="Simulador del Mundial 2026, predice los resultados de la fase de grupos">
<title>Simulador Mundial 2026</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Oficial - Mundial 2026</title>
    <style>
        :root {
            --primary: #2b78e4;
            --success: #27ae60;
            --purple: #8e44ad;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1, h2 {
            text-align: center;
            color: var(--dark);
        }
        .grid-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card-grupo {
            background: var(--light);
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
        }
        .card-grupo h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            color: var(--primary);
        }
        .select-wrapper {
            margin-bottom: 10px;
        }
        label {
            font-size: 12px;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: white;
        }
        .btn {
            display: block;
            width: 250px;
            margin: 30px auto 0;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }
        .btn:hover { background: #1a5ec2; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #1e8449; }
        .btn-purple { background: var(--purple); }
        .btn-purple:hover { background: #6c3483; }

        .seccion { display: none; }
        .seccion.activa { display: block; }

        .terceros-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .checkbox-wrapper {
            background: var(--light);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .match-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--light);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .match-code {
            font-weight: bold;
            color: #7f8c8d;
            min-width: 50px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            background: white;
            border: 1px solid #ccc;
            min-width: 150px;
        }
        .radio-label input { margin: 0; }
        .octavos-lista {
            max-width: 500px;
            margin: 0 auto;
            background: var(--light);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .octavos-item {
            padding: 8px 0;
            border-bottom: 1px dashed #ccc;
            font-size: 15px;
        }
        .octavos-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- PASO 1: FASE DE GRUPOS -->
    <div id="paso-grupos" class="seccion activa">
        <h1>Simulador Mundial 2026</h1>
        <h2>Fase de Grupos</h2>
        <div class="grid-grupos" id="contenedor-grupos"></div>
        <button class="btn" onclick="procesarFaseGrupos()">Elegir Mejores Terceros &rarr;</button>
    </div>

    <!-- PASO 2: SELECCIÓN DE MEJORES TERCEROS -->
    <div id="paso-terceros" class="seccion">
        <h1>Mejores Terceros Lugares</h1>
        <h2>Selecciona exactamente 8 equipos para avanzar a la Ronda de 32</h2>
        <div class="terceros-list" id="contenedor-terceros"></div>
        <button class="btn btn-success" onclick="procesarTerceros()">Generar Ronda de 32 &rarr;</button>
    </div>

    <!-- PASO 3: RONDA DE 32 -->
    <div id="paso-r32" class="seccion">
        <h1>Ronda de 32</h1>
        <h2>Selecciona al equipo ganador de cada llave</h2>
        <div id="contenedor-r32"></div>
        <button class="btn btn-purple" onclick="simularOctavos()">Avanzar a Octavos &rarr;</button>
    </div>

    <!-- PASO 4: OCTAVOS DE FINAL RESULTANTES -->
    <div id="paso-octavos" class="seccion">
        <h1>Octavos de Final Generados</h1>
        <h2>Así quedan tus llaves para la siguiente ronda</h2>
        <div class="octavos-lista" id="contenedor-octavos"></div>
        <button class="btn" onclick="reiniciar()">Reiniciar Simulador</button>
    </div>

</div>

<script>
    // Datos oficiales de la FIFA
    const grupos = {
        'A': ['México', 'Sudáfrica', 'Corea del Sur', 'República Checa'],
        'B': ['Canadá', 'Bosnia y Herzegovina', 'Qatar', 'Suiza'],
        'C': ['Brasil', 'Marruecos', 'Haití', 'Escocia'],
        'D': ['Estados Unidos', 'Paraguay', 'Australia', 'Turquía'],
        'E': ['Alemania', 'Curazao', 'Costa de Marfil', 'Ecuador'],
        'F': ['Países Bajos', 'Japón', 'Suecia', 'Túnez'],
        'G': ['Bélgica', 'Egipto', 'Irán', 'Nueva Zelanda'],
        'H': ['España', 'Cabo Verde', 'Arabia Saudita', 'Uruguay'],
        'I': ['Francia', 'Senegal', 'Irak', 'Noruega'],
        'J': ['Argentina', 'Argelia', 'Austria', 'Jordania'],
        'K': ['Portugal', 'RD Congo', 'Uzbekistán', 'Colombia'],
        'L': ['Inglaterra', 'Croacia', 'Ghana', 'Panamá']
    };

    let clasificados = {};
    let tMap = {};

    // Inicializar visualmente los 12 grupos
    function inicializarGrupos() {
        const contenedor = document.getElementById('contenedor-grupos');
        let html = '';
        for (const [letra, equipos] of Object.entries(grupos)) {
            html += `
                <div class="card-grupo">
                    <h3>Grupo ${letra}</h3>
                    <div class="select-wrapper">
                        <label>1° Lugar</label>
                        <select id="p1-${letra}">${equipos.map((e, i) => `<option value="${e}" ${i===0?'selected':''}>${e}</option>`).join('')}</select>
                    </div>
                    <div class="select-wrapper">
                        <label>2° Lugar</label>
                        <select id="p2-${letra}">${equipos.map((e, i) => `<option value="${e}" ${i===1?'selected':''}>${e}</option>`).join('')}</select>
                    </div>
                    <div class="select-wrapper">
                        <label>3° Lugar</label>
                        <select id="p3-${letra}">${equipos.map((e, i) => `<option value="${e}" ${i===2?'selected':''}>${e}</option>`).join('')}</select>
                    </div>
                </div>
            `;
        }
        contenedor.innerHTML = html;
    }

    function cambiarPaso(pasoActual, pasoSiguiente) {
        document.getElementById(pasoActual).classList.remove('activa');
        document.getElementById(pasoSiguiente).classList.add('activa');
        window.scrollTo(0,0);
    }

    function procesarFaseGrupos() {
        for (const letra of Object.keys(grupos)) {
            const p1 = document.getElementById(`p1-${letra}`).value;
            const p2 = document.getElementById(`p2-${letra}`).value;
            const p3 = document.getElementById(`p3-${letra}`).value;

            if (p1 === p2 || p1 === p3 || p2 === p3) {
                alert(`Error en el Grupo ${letra}: No puedes repetir posiciones para el mismo equipo.`);
                return;
            }
            clasificados[`1${letra}`] = p1;
            clasificados[`2${letra}`] = p2;
        }

        // Armar pantalla de terceros
        const contenedorTerceros = document.getElementById('contenedor-terceros');
        let html = '';
        for (const letra of Object.keys(grupos)) {
            const p3 = document.getElementById(`p3-${letra}`).value;
            html += `
                <label class="checkbox-wrapper">
                    <input type="checkbox" name="terceros" value="${p3}" data-grupo="${letra}">
                    <span>${p3} (Grupo ${letra})</span>
                </label>
            `;
        }
        contenedorTerceros.innerHTML = html;
        cambiarPaso('paso-grupos', 'paso-terceros');
    }

    function procesarTerceros() {
        const checkboxes = document.querySelectorAll('input[name="terceros"]:checked');
        if (checkboxes.length !== 8) {
            alert(`Debes seleccionar exactamente a 8 mejores terceros. Has elegido: ${checkboxes.length}`);
            return;
        }

        const seleccionados = Array.from(checkboxes).map(cb => cb.value);
        tMap = {
            '3ABCDF': seleccionados[0], '3CDFGH': seleccionados[1],
            '3BEFIJ': seleccionados[2], '3AEHIJ': seleccionados[3],
            '3CEFHI': seleccionados[4], '3EHIJK': seleccionados[5],
            '3EFGIJ': seleccionados[6], '3DEIJL': seleccionados[7]
        };

        armarRonda32();
    }

    function armarRonda32() {
        const contenedor = document.getElementById('contenedor-r32');
        const llaves = [
            { c: 'M74', l: clasificados['1E'], v: tMap['3ABCDF'] },
            { c: 'M77', l: clasificados['1I'], v: tMap['3CDFGH'] },
            { c: 'M73', l: clasificados['2A'], v: clasificados['2B'] },
            { c: 'M75', l: clasificados['1F'], v: clasificados['2C'] },
            { c: 'M83', l: clasificados['2K'], v: clasificados['2L'] },
            { c: 'M84', l: clasificados['1H'], v: clasificados['2J'] },
            { c: 'M81', l: clasificados['1D'], v: tMap['3BEFIJ'] },
            { c: 'M82', l: clasificados['1G'], v: tMap['3AEHIJ'] },
            { c: 'M76', l: clasificados['1C'], v: clasificados['2F'] },
            { c: 'M78', l: clasificados['2E'], v: clasificados['2I'] },
            { c: 'M79', l: clasificados['1A'], v: tMap['3CEFHI'] },
            { c: 'M80', l: clasificados['1L'], v: tMap['3EHIJK'] },
            { c: 'M86', l: clasificados['1J'], v: clasificados['2H'] },
            { c: 'M88', l: clasificados['2D'], v: clasificados['2G'] },
            { c: 'M85', l: clasificados['1B'], v: tMap['3EFGIJ'] },
            { c: 'M87', l: clasificados['1K'], v: tMap['3DEIJL'] }
        ];

        let html = '';
        llaves.forEach(m => {
            html += `
                <div class="match-row">
                    <span class="match-code">[${m.c}]</span>
                    <label class="radio-label">
                        <input type="radio" name="${m.c}" value="${m.l}" checked> ${m.l}
                    </label>
                    <span>vs</span>
                    <label class="radio-label">
                        <input type="radio" name="${m.c}" value="${m.v}"> ${m.v}
                    </label>
                </div>
            `;
        });
        contenedor.innerHTML = html;
        cambiarPaso('paso-terceros', 'paso-r32');
    }

    function obtenerGanador(codigo) {
        return document.querySelector(`input[name="${codigo}"]:checked`).value;
    }

    function simularOctavos() {
        const w74 = obtenerGanador('M74'); const w77 = obtenerGanador('M77');
        const w73 = obtenerGanador('M73'); const w75 = obtenerGanador('M75');
        const w83 = obtenerGanador('M83'); const w84 = obtenerGanador('M84');
        const w81 = obtenerGanador('M81'); const w82 = obtenerGanador('M82');
        const w76 = obtenerGanador('M76'); const w78 = obtenerGanador('M78');
        const w79 = obtenerGanador('M79'); const w80 = obtenerGanador('M80');
        const w86 = obtenerGanador('M86'); const w88 = obtenerGanador('M88');
        const w85 = obtenerGanador('M85'); const w87 = obtenerGanador('M87');

        const contenedor = document.getElementById('contenedor-octavos');
        contenedor.innerHTML = `
            <div class="octavos-item"><strong>Llave 1:</strong> ${w74} vs ${w77}</div>
            <div class="octavos-item"><strong>Llave 2:</strong> ${w73} vs ${w75}</div>
            <div class="octavos-item"><strong>Llave 3:</strong> ${w83} vs ${w84}</div>
            <div class="octavos-item"><strong>Llave 4:</strong> ${w81} vs ${w82}</div>
            <div class="octavos-item"><strong>Llave 5:</strong> ${w76} vs ${w78}</div>
            <div class="octavos-item"><strong>Llave 6:</strong> ${w79} vs ${w80}</div>
            <div class="octavos-item"><strong>Llave 7:</strong> ${w86} vs ${w88}</div>
            <div class="octavos-item"><strong>Llave 8:</strong> ${w85} vs ${w87}</div>
        `;

        cambiarPaso('paso-r32', 'paso-octavos');
    }

    function reiniciar() {
        inicializarGrupos();
        cambiarPaso('paso-octavos', 'paso-grupos');
    }

    // Arrancar el programa al cargar la página
    window.onload = inicializarGrupos;
</script>
</body>
</html>
